<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browser Control — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #1a1a2e; max-width: 600px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #6b7280; margin-bottom: 24px; font-size: 13px; }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 15px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #e5e5e5; }
    .field { margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .field label { min-width: 140px; font-weight: 500; }
    .field input { flex: 1; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
    .field input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
    .info { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    button { padding: 8px 20px; background: #667eea; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { background: #5a6fd6; }
    .saved { color: #22c55e; font-size: 12px; margin-left: 12px; opacity: 0; transition: opacity 0.3s; }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Browser Control</h1>
  <p class="subtitle">Configure the bridge between AI agents and your Chrome browser.</p>

  <div class="section">
    <h2>Connection</h2>
    <div class="field">
      <label for="daemonUrl">Daemon URL</label>
      <input id="daemonUrl" type="text" placeholder="ws://127.0.0.1:10087/ws">
    </div>
    <p class="info">The local daemon WebSocket address. Defaults to ws://127.0.0.1:10087/ws</p>
  </div>

  <div class="section">
    <h2>Behavior</h2>
    <div class="field">
      <label for="requestTimeout">Request Timeout (ms)</label>
      <input id="requestTimeout" type="number" min="5000" max="120000" value="30000" placeholder="30000">
    </div>
    <p class="info">Default timeout for commands sent to the daemon.</p>
  </div>

  <div class="section">
    <h2>Security</h2>
    <div class="field">
      <label for="confirmActions">Confirm Actions</label>
      <input id="confirmActions" type="checkbox" checked>
    </div>
    <p class="info">Show confirmation dialog before risky browser actions.</p>
  </div>

  <button id="btnSave">Save Settings</button>
  <span class="saved" id="savedMsg">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
